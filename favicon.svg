<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img"
    aria-label="OhadaKit">
  <title>OhadaKit</title>
  <!-- Ledger/chart-of-accounts icon: indented rows + emerald amount column -->
  <rect width="32" height="32" rx="7" fill="#0e3fa8"/>
  <!-- Class row (widest) -->
  <rect x="4" y="6"  width="20" height="4" rx="1" fill="#ffffff" fill-opacity="0.90"/>
  <rect x="26" y="6" width="4"  height="4" rx="1" fill="#34d399"/>
  <!-- Group row (indented) -->
  <rect x="7" y="14" width="14" height="4" rx="1" fill="#ffffff" fill-opacity="0.60"/>
  <rect x="26" y="14" width="4" height="4" rx="1" fill="#34d399" fill-opacity="0.70"/>
  <!-- Account row (more indented) -->
  <rect x="10" y="22" width="10" height="4" rx="1" fill="#ffffff" fill-opacity="0.40"/>
  <rect x="26" y="22" width="4"  height="4" rx="1" fill="#34d399" fill-opacity="0.50"/>
  <!-- Vertical connector line -->
  <line x1="5.5" y1="10" x2="5.5" y2="26" stroke="#ffffff" stroke-opacity="0.30" stroke-width="1"/>
</svg>
