<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 200" role="img"
    aria-label="OhadaKit logo">
  <title>OhadaKit</title>

  <defs>
    <linearGradient id="lw-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a358a"/>
      <stop offset="60%" stop-color="#0e3fa8"/>
      <stop offset="100%" stop-color="#1146b8"/>
    </linearGradient>
    <radialGradient id="lw-halo" cx="0" cy="0" r="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#5b8cff" stop-opacity="0.22"/>
      <stop offset="65%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>
    <style><![CDATA[
      .name { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
              font-weight: 600; letter-spacing: -0.02em; fill: #0a358a; }
      .tag  { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
              fill: #6b7280; font-weight: 500; letter-spacing: 0.01em; }
    ]]></style>
  </defs>

  <!-- ─── Mark on the left (140 × 140 box) ─────────────────── -->
  <g transform="translate(20,30)">
    <rect width="140" height="140" rx="32" fill="url(#lw-bg)"/>
    <rect width="140" height="140" rx="32" fill="url(#lw-halo)"/>
    <!-- Ledger / chart-of-accounts icon (scaled to 140×140 box) -->
    <!-- Row 1 — Class level (emerald) -->
    <rect x="22" y="38" width="58" height="8" rx="2.5" fill="#34d399"/>
    <!-- Vertical connector -->
    <line x1="26" y1="46" x2="26" y2="94" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.5"/>
    <!-- Row 2 — Group level -->
    <rect x="36" y="56" width="44" height="7" rx="2" fill="#ffffff" fill-opacity="0.55"/>
    <line x1="26" y1="59" x2="36" y2="59" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.5"/>
    <!-- Row 3 — Account level -->
    <rect x="46" y="72" width="32" height="6" rx="2" fill="#ffffff" fill-opacity="0.35"/>
    <line x1="26" y1="75" x2="46" y2="75" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.2"/>
    <!-- Row 4 — Account level sibling -->
    <rect x="46" y="86" width="40" height="6" rx="2" fill="#ffffff" fill-opacity="0.35"/>
    <line x1="26" y1="89" x2="46" y2="89" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.2"/>
    <!-- O(1) badge -->
    <rect x="90" y="82" width="30" height="16" rx="5" fill="#34d399"/>
    <text x="105" y="93" font-family="ui-monospace, monospace" font-size="8"
          font-weight="700" fill="#0a358a" text-anchor="middle">O(1)</text>
  </g>

  <!-- ─── Wordmark on the right ────────────────────────────── -->
  <text x="194" y="115" class="name" font-size="68">OhadaKit</text>
  <text x="196" y="148" class="tag"  font-size="17">OHADA chart of accounts SDK</text>
</svg>
