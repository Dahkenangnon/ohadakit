<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img"
    aria-label="OhadaKit — OHADA chart of accounts SDK">
  <title>OhadaKit — OHADA chart of accounts SDK</title>

  <defs>
    <!-- Navy "blueprint" gradient (matching the reference) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a358a"/>
      <stop offset="55%" stop-color="#0e3fa8"/>
      <stop offset="100%" stop-color="#1146b8"/>
    </linearGradient>

    <!-- Subtle dot grid pattern across the whole canvas -->
    <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.9" fill="#ffffff" fill-opacity="0.08"/>
    </pattern>

    <!-- Calendar-cell pattern for the right-side decoration -->
    <pattern id="cal" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <rect x="0.5" y="0.5" width="47" height="47" fill="none"
            stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
    </pattern>

    <!-- Soft radial highlight in the upper-left -->
    <radialGradient id="halo" cx="0" cy="0" r="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%"  stop-color="#5b8cff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#5b8cff" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft fade mask for the ledger decoration: left hidden, right visible -->
    <linearGradient id="calFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#000000"/>
      <stop offset="45%"  stop-color="#000000"/>
      <stop offset="70%"  stop-color="#777777"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <mask id="calMask">
      <rect width="1200" height="420" fill="url(#calFade)"/>
    </mask>

    <!-- Generic feature-pill template uses these styles -->
    <style><![CDATA[
      .title    { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
                  font-weight: 600; letter-spacing: -0.02em; fill: #ffffff; }
      .title-em { font-family: ui-serif, "New York", "Iowan Old Style", Georgia, serif;
                  font-style: italic; font-weight: 400; letter-spacing: -0.01em; fill: #b9d4ff; }
      .sub      { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
                  fill: #ffffff; }
      .desc     { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, sans-serif;
                  fill: #ffffff; fill-opacity: 0.78; }
      .mono     { font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
      .pill-bg  { fill: #ffffff; }
      .pill-tx  { fill: #0a358a; font-weight: 500; }
      .cta-bg   { fill: #ffffff; }
      .cta-tx   { fill: #0a358a; font-weight: 600; }
      .marker   { stroke: #ffffff; stroke-opacity: 0.35; stroke-width: 1; fill: none; }
    ]]></style>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="420" fill="url(#bg)"/>
  <rect width="1200" height="420" fill="url(#halo)"/>
  <rect width="1200" height="420" fill="url(#dots)"/>

  <!-- Right-side ledger-rows decoration (faded, masked) -->
  <g mask="url(#calMask)">
    <rect x="700" y="-20" width="540" height="460" fill="url(#cal)"/>
    <!-- Account row highlights suggesting chart of accounts -->
    <rect x="844.5"  y="123.5" width="47" height="47" fill="#ffffff" fill-opacity="0.12"/>
    <rect x="892.5"  y="123.5" width="47" height="47" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="988.5"  y="171.5" width="47" height="47" fill="#34d399" fill-opacity="0.32"/>
    <rect x="1036.5" y="171.5" width="47" height="47" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="940.5"  y="219.5" width="47" height="47" fill="#ffffff" fill-opacity="0.07"/>
    <rect x="1084.5" y="123.5" width="47" height="47" fill="#34d399" fill-opacity="0.18"/>
    <rect x="892.5"  y="219.5" width="47" height="47" fill="#ffffff" fill-opacity="0.10"/>
    <rect x="1036.5" y="267.5" width="47" height="47" fill="#34d399" fill-opacity="0.10"/>
  </g>

  <!-- Corner crosshair markers (blueprint feel) -->
  <g class="marker">
    <path d="M 24 14 L 24 34 M 14 24 L 34 24"/>
    <path d="M 1176 14 L 1176 34 M 1166 24 L 1186 24"/>
    <path d="M 24 386 L 24 406 M 14 396 L 34 396"/>
    <path d="M 1176 386 L 1176 406 M 1166 396 L 1186 396"/>
  </g>

  <!-- ─── Headline ─────────────────────────────────────────── -->
  <text x="64" y="138" class="title" font-size="62">OhadaKit</text>
  <text x="64" y="208" class="title" font-size="62">for <tspan class="title-em">OHADA&#160;&amp;&#160;SYSCOHADA</tspan>.</text>

  <!-- ─── Feature pills ────────────────────────────────────── -->
  <g transform="translate(64,256)">
    <!-- Pill 1: O(1) Lookups -->
    <g>
      <rect x="0" y="0" width="168" height="34" rx="17" class="pill-bg"/>
      <!-- speed/lookup icon -->
      <g transform="translate(13,7)" stroke="#0a358a" stroke-width="1.6" fill="none"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 2 L5 10 h5 L7 18"/>
      </g>
      <text x="38" y="22" class="pill-tx" font-size="13.5">O(1) Lookups</text>
    </g>
    <!-- Pill 2: Query Builder -->
    <g transform="translate(184,0)">
      <rect x="0" y="0" width="180" height="34" rx="17" class="pill-bg"/>
      <g transform="translate(11,8)" stroke="#0a358a" stroke-width="1.6" fill="none"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M2 4 h14 M2 9 h10 M2 14 h7"/>
      </g>
      <text x="38" y="22" class="pill-tx" font-size="13.5">Fluent Query Builder</text>
    </g>
    <!-- Pill 3: Zero deps -->
    <g transform="translate(380,0)">
      <rect x="0" y="0" width="168" height="34" rx="17" class="pill-bg"/>
      <g transform="translate(12,8)" stroke="#0a358a" stroke-width="1.6" fill="none"
         stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="9" r="8"/>
        <path d="M9 1 V17 M1 9 H17"/>
      </g>
      <text x="38" y="22" class="pill-tx" font-size="13.5">Zero dependencies</text>
    </g>
  </g>

  <!-- Horizontal divider -->
  <line x1="64" y1="316" x2="1136" y2="316"
        stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>

  <!-- ─── Bottom row: domain | description | CTA ─────────── -->

  <!-- Domain pill -->
  <g transform="translate(64,340)">
    <rect x="0" y="0" width="232" height="48" rx="10" class="pill-bg"/>
    <!-- globe icon -->
    <g transform="translate(13,12)" stroke="#0a358a" stroke-width="1.7" fill="none"
       stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="11"/>
      <path d="M1 12 H23 M12 1 a16 16 0 0 1 0 22 a16 16 0 0 1 0 -22"/>
    </g>
    <text x="48" y="30" class="pill-tx mono" font-size="15.5">ohadakit.claviscore.com</text>
  </g>

  <!-- Description -->
  <text x="316" y="362" class="desc" font-size="13.5">
    <tspan x="316" dy="0">Full OHADA/SYSCOHADA chart of accounts — 1000+ accounts, type-safe API,</tspan>
    <tspan x="316" dy="18">i18n, custom overlays, export. Zero dependencies, ESM + CJS + browser.</tspan>
  </text>

  <!-- CTA button -->
  <g transform="translate(950,340)" cursor="pointer">
    <rect x="0" y="0" width="186" height="48" rx="10" class="cta-bg"/>
    <text x="22" y="30" class="cta-tx" font-size="14.5">Explore OhadaKit</text>
    <g transform="translate(155,18)" stroke="#0a358a" stroke-width="1.8" fill="none"
       stroke-linecap="round" stroke-linejoin="round">
      <path d="M0 6 H12 M7 1 L12 6 L7 11"/>
    </g>
  </g>
</svg>
